<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Mix Shope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages.css" />
  </head>

  <body data-page="login">
    <div class="page-shell">
      <header class="site-header">
        <div class="container">
          <a href="../index.html" class="site-logo">Mix Shope</a>

          <nav class="site-nav" aria-label="Main navigation">
            <a href="../index.html">Home</a>

            <div class="nav-logged-out">
              <a href="../account/login.html" data-nav-login aria-current="page">Login</a>
              <a href="../account/register.html">Register</a>
            </div>

            <div class="nav-logged-in" hidden>
              <span data-nav-username></span>
              <a href="../cart/index.html" class="nav-cart" aria-label="Cart">
                Cart
                <span class="badge" data-cart-count hidden></span>
              </a>
              <button type="button" data-nav-logout>Logout</button>
            </div>
          </nav>
        </div>
      </header>

      <main class="page-grid">
        <section class="card" aria-labelledby="login-heading">
          <p class="page-accent">Welcome Back</p>
          <h1 class="section-title" id="login-heading">Log In</h1>
          <p class="section-copy">
            Sign in to continue shopping, review your cart, and move through checkout faster.
          </p>

          <form id="login-form" novalidate>
            <div class="form-group">
              <label for="login-email">Email</label>
              <input
                type="email"
                id="login-email"
                name="email"
                class="input-field"
                autocomplete="username"
                required
                placeholder="name@stud.noroff.no"
              />
            </div>

            <div class="form-group">
              <label for="login-password">Password</label>
              <input
                type="password"
                id="login-password"
                name="password"
                class="input-field"
                autocomplete="current-password"
                required
                placeholder="Enter your password"
              />
            </div>

            <button type="submit" class="btn-primary">Log In</button>

            <div
              id="login-form-feedback"
              data-login-feedback
              role="status"
              aria-live="polite"
            ></div>
          </form>

          <p class="section-copy">
            Don't have an account? <a href="../account/register.html">Register</a>
          </p>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container">
          <div class="footer-meta">
            <p class="footer-brand">Mix Shope</p>
            <p class="footer-note">Simple shopping for the Noroff course project.</p>
          </div>
          <p class="footer-legal">&copy; 2026 Mix Shope. All rights reserved.</p>
        </div>
      </footer>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
